<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluador de Proyectos</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

.container {
    width: 100%;
    max-width: 420px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
}

h2 { text-align: center; color: #2c5364; }

label { font-size: 13px; font-weight: bold; }

input {
    width: 100%;
    padding: 12px;
    margin: 6px 0 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    margin-top: 8px;
    cursor: pointer;
}

#btn { background: #2c5364; color: white; }
#resetBtn { background: #ecf0f1; }

.result {
    margin-top: 20px;
    padding: 15px;
    background: #f4f6f8;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.5;
    transition: all 0.4s ease;
}

/* 🔥 NUEVO: efecto visual */
.result.highlight {
    border: 2px solid #2c5364;
    box-shadow: 0 0 10px rgba(44, 83, 100, 0.4);
    transform: scale(1.02);
}

.good { color: green; }
.bad { color: red; }
</style>
</head>

<body>

<div class="container">
    <h2>Evaluador de Proyectos</h2>

    <label>Inversión Inicial</label>
    <input id="investment" placeholder="Ej: 1000">

    <label>Ventas por período</label>
    <input id="sales" placeholder="Ej: 1000,1000,1000">

    <label>Costos/Gastos por período</label>
    <input id="costs" placeholder="Ej: 600,600,600">

    <label>Depreciación (por período)</label>
    <input id="depreciation" placeholder="Ej: 50">

    <label>Tasa de impuesto</label>
    <input id="tax" placeholder="Ej: 0.2">

    <label>Tasa de descuento</label>
    <input id="rate" placeholder="Ej: 0.1">

    <button id="btn">Evaluar Proyecto</button>
    <button id="resetBtn">Limpiar</button>

    <div class="result" id="result"></div>

    <canvas id="chart" style="margin-top:20px;"></canvas>
</div>

<script>

document.getElementById("btn").addEventListener("click", evaluate);
document.getElementById("resetBtn").addEventListener("click", resetForm);

function resetForm() {
    document.querySelectorAll("input").forEach(i => i.value = "");
    document.getElementById("result").innerHTML = "";
    document.getElementById("result").classList.remove("highlight");
    if (chartInstance) chartInstance.destroy();
}

function npv(rate, cashflows) {
    let total = 0;
    for (let t = 0; t < cashflows.length; t++) {
        total += cashflows[t] / Math.pow(1 + rate, t);
    }
    return total;
}

function irr(cashflows) {
    let rate = 0.1;
    for (let i = 0; i < 1000; i++) {
        let f = 0, df = 0;
        for (let t = 0; t < cashflows.length; t++) {
            f += cashflows[t] / Math.pow(1 + rate, t);
            df += -t * cashflows[t] / Math.pow(1 + rate, t + 1);
        }
        if (df === 0) return null;
        let newRate = rate - f / df;
        if (Math.abs(newRate - rate) < 1e-6) return newRate;
        rate = newRate;
    }
    return null;
}

let chartInstance = null;

function drawChart(cashflows) {

    let rates = [];
    let values = [];

    for (let r = 0; r <= 0.5; r += 0.01) {
        rates.push((r * 100).toFixed(0));

        let total = 0;
        for (let t = 0; t < cashflows.length; t++) {
            total += cashflows[t] / Math.pow(1 + r, t);
        }
        values.push(total);
    }

    const ctx = document.getElementById('chart');

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: rates,
            datasets: [{
                label: 'VAN vs Tasa (%)',
                data: values,
                tension: 0.3
            }]
        },
        options: { responsive: true }
    });
}

function evaluate() {

    const investment = parseFloat(document.getElementById("investment").value);
    const sales = document.getElementById("sales").value.split(",").map(Number);
    const costs = document.getElementById("costs").value.split(",").map(Number);
    const depreciation = parseFloat(document.getElementById("depreciation").value);
    const tax = parseFloat(document.getElementById("tax").value);
    const rate = parseFloat(document.getElementById("rate").value);

    if (sales.length !== costs.length) {
        alert("Ventas y costos deben coincidir");
        return;
    }

    let cashflows = [-investment];

    for (let i = 0; i < sales.length; i++) {
        let result = sales[i] - costs[i] - depreciation;
        let taxes = result * tax;
        let net = result - taxes;
        let flow = net + depreciation;
        cashflows.push(flow);
    }

    const npvValue = npv(rate, cashflows);
    const irrValue = irr(cashflows);

    let irrText = irrValue ? (irrValue * 100).toFixed(2) + "%" : "No calculable";
    let rateText = (rate * 100).toFixed(2) + "%";

    let comment;

    if (irrValue !== null && irrValue < 0) {
        comment = `
        Este proyecto no logra recuperar la inversión.<br><br>
        <strong>Interpretación:</strong> perderías dinero.<br>
        <strong>Recomendación:</strong> no invertir.
        `;
    } else if (npvValue > 0) {
        comment = `
        Este proyecto genera valor.<br><br>
        - Ganancia: <strong>${npvValue.toFixed(2)}</strong><br>
        - TIR: <strong>${irrText}</strong><br>
        - Tasa: <strong>${rateText}</strong><br><br>
        <strong>Recomendación:</strong> conviene invertir.
        `;
    } else {
        comment = `
        Este proyecto no genera valor suficiente.<br><br>
        <strong>Recomendación:</strong> no conviene invertir.
        `;
    }

    const resultBox = document.getElementById("result");

    resultBox.innerHTML = `
        <p><strong>Flujos:</strong> ${cashflows.join(", ")}</p>
        <p><strong>VAN:</strong> ${npvValue.toFixed(2)}</p>
        <p><strong>TIR:</strong> ${irrText}</p>
        <hr>
        <p>${comment}</p>
    `;

    // 🔥 ACTIVAR EFECTO VISUAL
    resultBox.classList.remove("highlight");
    void resultBox.offsetWidth; // reinicia animación
    resultBox.classList.add("highlight");

    drawChart(cashflows);
}

</script>

</body>
</html>
