<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluador de Proyectos</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

.container {
    width: 100%;
    max-width: 420px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
}

h2 {
    text-align: center;
    color: #2c5364;
}

label {
    font-size: 13px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 12px;
    margin: 6px 0 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    margin-top: 8px;
    cursor: pointer;
}

#btn { background: #2c5364; color: white; }
#resetBtn { background: #ecf0f1; }

.result {
    margin-top: 20px;
    padding: 15px;
    background: #f4f6f8;
    border-radius: 8px;
}

.good { color: green; }
.bad { color: red; }
</style>
</head>

<body>

<div class="container">
    <h2>Evaluador de Proyectos</h2>

    <label>Inversión Inicial</label>
    <input id="investment" placeholder="Ej: 1000">

    <label>Ventas por período</label>
    <input id="sales" placeholder="Ej: 1000,1000,1000">

    <label>Costos/Gastos por período</label>
    <input id="costs" placeholder="Ej: 600,600,600">

    <label>Depreciación (por período)</label>
    <input id="depreciation" placeholder="Ej: 50">

    <label>Tasa de impuesto (ej: 0.2)</label>
    <input id="tax" placeholder="Ej: 0.2">

    <label>Tasa de descuento (ej: 0.1)</label>
    <input id="rate" placeholder="Ej: 0.1">

    <button id="btn">Evaluar Proyecto</button>
    <button id="resetBtn">Limpiar</button>

    <div class="result" id="result"></div>
</div>

<script>

document.getElementById("btn").addEventListener("click", evaluate);
document.getElementById("resetBtn").addEventListener("click", resetForm);

function resetForm() {
    document.querySelectorAll("input").forEach(i => i.value = "");
    document.getElementById("result").innerHTML = "";
}

function npv(rate, cashflows) {
    let total = 0;
    for (let t = 0; t < cashflows.length; t++) {
        total += cashflows[t] / Math.pow(1 + rate, t);
    }
    return total;
}

function irr(cashflows) {
    let rate = 0.1;

    for (let i = 0; i < 1000; i++) {
        let f = 0, df = 0;

        for (let t = 0; t < cashflows.length; t++) {
            f += cashflows[t] / Math.pow(1 + rate, t);
            df += -t * cashflows[t] / Math.pow(1 + rate, t + 1);
        }

        if (df === 0) return null;

        let newRate = rate - f / df;
        if (Math.abs(newRate - rate) < 1e-6) return newRate;

        rate = newRate;
    }

    return null;
}

function evaluate() {

    const investment = parseFloat(document.getElementById("investment").value);
    const sales = document.getElementById("sales").value.split(",").map(Number);
    const costs = document.getElementById("costs").value.split(",").map(Number);
    const depreciation = parseFloat(document.getElementById("depreciation").value);
    const tax = parseFloat(document.getElementById("tax").value);
    const rate = parseFloat(document.getElementById("rate").value);

    if (sales.length !== costs.length) {
        alert("Ventas y costos deben tener la misma cantidad de períodos");
        return;
    }

    let cashflows = [-investment];

    for (let i = 0; i < sales.length; i++) {

        let result = sales[i] - costs[i] - depreciation;
        let taxes = result * tax;
        let net = result - taxes;

        let flow = net + depreciation;

        cashflows.push(flow);
    }

    const npvValue = npv(rate, cashflows);
    const irrValue = irr(cashflows);

    let irrText = irrValue ? (irrValue * 100).toFixed(2) + "%" : "No calculable";
    let rateText = (rate * 100).toFixed(2) + "%";

    let decision = npvValue > 0 ? "✔ Conviene" : "✖ No conviene";
    let css = npvValue > 0 ? "good" : "bad";

    // 👉 NUEVO COMENTARIO INTELIGENTE
    let comment;

    if (irrValue !== null && irrValue < 0) {
        comment = `
        Este proyecto no logra recuperar la inversión.<br><br>
        Aunque genera ingresos, no son suficientes para cubrir lo invertido en términos financieros.<br><br>
        <strong>Interpretación:</strong> perderías dinero en términos reales.<br>
        <strong>Recomendación:</strong> no invertir en este proyecto.
        `;
    } 
    else if (npvValue > 0) {
        comment = `
        Este proyecto genera valor.<br><br>
        - Ganancia adicional: <strong>${npvValue.toFixed(2)}</strong><br>
        - Rentabilidad del proyecto (TIR): <strong>${irrText}</strong><br>
        - Rentabilidad mínima exigida: <strong>${rateText}</strong><br><br>
        <strong>Interpretación:</strong> el proyecto rinde más que tu alternativa (ej: banco).<br>
        <strong>Recomendación:</strong> conviene invertir.
        `;
    } 
    else if (npvValue < 0) {
        comment = `
        Este proyecto no genera suficiente valor.<br><br>
        - Pérdida de valor: <strong>${Math.abs(npvValue).toFixed(2)}</strong><br>
        - Rentabilidad del proyecto (TIR): <strong>${irrText}</strong><br>
        - Rentabilidad mínima exigida: <strong>${rateText}</strong><br><br>
        <strong>Interpretación:</strong> el proyecto rinde menos que tu alternativa (ej: banco).<br>
        <strong>Recomendación:</strong> no conviene invertir.
        `;
    } 
    else {
        comment = `
        El proyecto recupera exactamente lo invertido.<br><br>
        - Rentabilidad del proyecto: <strong>${irrText}</strong><br>
        - Rentabilidad exigida: <strong>${rateText}</strong><br><br>
        <strong>Interpretación:</strong> no ganas ni pierdes valor.<br>
        <strong>Recomendación:</strong> es indiferente invertir o no.
        `;
    }

    document.getElementById("result").innerHTML = `
        <p><strong>Flujos:</strong> ${cashflows.join(", ")}</p>
        <p><strong>VAN:</strong> ${npvValue.toFixed(2)}</p>
        <p><strong>TIR:</strong> ${irrText}</p>
        <p class="${css}">${decision}</p>
        <hr>
        <p><strong>${comment}</strong></p>
    `;
}

</script>

</body>
</html>
